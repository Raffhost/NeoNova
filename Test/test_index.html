<!DOCTYPE html>
<html>
<head>
    <title>Stacker Game</title>
    <style>
        body {
            margin: 0;
            background: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: Arial;
        }
        #gameContainer {
            text-align: center;
        }
        canvas {
            border: 2px solid #444;
        }
        #score {
            color: white;
            font-size: 24px;
            margin: 10px;
        }
        #highScore {
            color: gold;
            font-size: 18px;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <div id="score">Уровень: <span id="level">0</span></div>
        <div id="highScore">Рекорд: <span id="best">0</span></div>
        <canvas id="canvas" width="600" height="800"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        // КОНСТАНТЫ
        const BLOCK_HEIGHT = 25;
        let BLOCK_WIDTH = 75;
        const BLOCK_SPEED = 5;
        
        // СОСТОЯНИЕ
        let blockX = 0;
        let blockY = canvas.height - BLOCK_HEIGHT;
        let direction = 1;
        let level = 0;
        let gameOver = false;
        let fallenBlocks = [];
        
        // ОТРИСОВКА
        function draw() {
            // Очистка
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Упавшие блоки
            ctx.fillStyle = '#888';
            fallenBlocks.forEach(block => {
                ctx.fillRect(block.x, block.y, block.width, BLOCK_HEIGHT);
            });
            
            // Движущийся блок
            if (!gameOver) {
                ctx.fillStyle = '#fff';
                ctx.fillRect(blockX, blockY, BLOCK_WIDTH, BLOCK_HEIGHT);
            }
        }
        
        // ДВИЖЕНИЕ
        function update() {
            if (gameOver) return;
            
            blockX += direction * BLOCK_SPEED;
            
            // Отскок
            if (blockX <= 0 || blockX + BLOCK_WIDTH >= canvas.width) {
                direction *= -1;
            }
        }
        
        // ИГРОВОЙ ЦИКЛ
        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }
        
        // ОСТАНОВКА БЛОКА
        function placeBlock() {
            if (gameOver) return;
            
            if (fallenBlocks.length > 0) {
                const prev = fallenBlocks[fallenBlocks.length - 1];
                
                // Проверка попадания
                if (blockX + BLOCK_WIDTH < prev.x || blockX > prev.x + prev.width) {
                    // GAME OVER
                    gameOver = true;
                    
                    ctx.fillStyle = 'red';
                    ctx.font = '48px Arial';
                    ctx.textAlign = 'center';
                    ctx.fillText('GAME OVER', canvas.width/2, canvas.height/2);
                    ctx.fillStyle = 'white';
                    ctx.font = '24px Arial';
                    ctx.fillText('Уровень: ' + level, canvas.width/2, canvas.height/2 + 50);
                    return;
                }
                
                // Обрезка блока
                const overlapLeft = Math.max(blockX, prev.x);
                const overlapRight = Math.min(blockX + BLOCK_WIDTH, prev.x + prev.width);
                
                blockX = overlapLeft;
                BLOCK_WIDTH = overlapRight - overlapLeft;
            }
            
            // Сохраняем блок
            fallenBlocks.push({ x: blockX, y: blockY, width: BLOCK_WIDTH });
            
            // Следующий уровень
            level++;
            document.getElementById('level').textContent = level;
            
            // Новый блок
            blockX = 0;
            blockY -= BLOCK_HEIGHT;
            
            // Победа?
            if (blockY < 0) {
                gameOver = true;
                ctx.fillStyle = 'green';
                ctx.font = '48px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('ПОБЕДА!', canvas.width/2, canvas.height/2);
            }
        }
        
        // УПРАВЛЕНИЕ
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                placeBlock();
            }
        });
        
        // СТАРТ
        // Базовый блок
        fallenBlocks.push({
            x: canvas.width/2 - 75/2,
            y: canvas.height - BLOCK_HEIGHT,
            width: 75
        });
        blockY = canvas.height - 2 * BLOCK_HEIGHT;
        
        gameLoop();
    </script>
</body>
</html>
