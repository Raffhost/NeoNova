<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>NeoNova</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon"  type="image/png" href="png/logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
</head>


<body>
    
<header class="header bordered">
    <div class="container">
        <div class="header__content">
            <div class="header__start">
                <div class="header__logo">
                    <img src="png/logo.png" alt="Logo">
                </div>
                
            </div>
           
        </div>
    </div>
</header>

<div class="all">
    <div class="title">
    <h1>NEONOVA</h1>
    </div>
    <div class="main">  
        <div class="info">   
            <h2>Lets play!</h2>
        </div>
        <div class="nav">
        <input class="input-md" type="text" placeholder="Nickname">
        <button class="play-btn">➤</button>
    </div>
    
</div>
<footer>
    <div>
        <h3>Created by NeoNova Team</h3>
    </div>
</footer>
</body>

</html>
